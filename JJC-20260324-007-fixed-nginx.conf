# Fixed configuration for JJC-20260324-007
# Original problem: incorrect rewrite rule caused static resources 404
# Fixed: rewrite correctly strips /generateImg prefix to match Next.js expectations

# AI Thumbnail Generator - /generateImg proxy to localhost:3000
# Next.js expects to be accessed from root, so strip /generateImg prefix
location ~ ^/generateImg(/.*)?$ {
    rewrite ^/generateImg(/.*)$ $1 break;
    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}
